<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Demo Concientización Ciberseguridad</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#000; font-family: 'Courier New', monospace;
  }

  /* ---------- PANTALLA 1: minimalista ---------- */
  #pantalla-inicial {
    position:fixed; inset:0;
    background:#000;
    display:flex; align-items:center; justify-content:center;
    z-index:10;
  }
  #btn-descargar {
    background:#111;
    color:#eee;
    border:2px solid #444;
    border-radius:10px;
    padding:18px 28px;
    font-size:1.1rem;
    font-family: 'Courier New', monospace;
    max-width:85vw;
    cursor:pointer;
    transition: background .2s, border-color .2s;
  }
  #btn-descargar:active {
    background:#222;
    border-color:#666;
  }

  /* ---------- PANTALLA 2: hackeado ---------- */
  #pantalla-hackeado {
    position:fixed; inset:0;
    background:#000;
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    z-index:20;
    padding:5vw;
    overflow:hidden;
  }
  #pantalla-hackeado.activa { display:flex; }

  .calavera {
    font-size:22vw;
    line-height:1;
    margin-bottom:4vh;
    animation: parpadeo 0.6s steps(2, start) infinite, sacudida 0.15s linear infinite;
  }

  .titulo-hackeado {
    color:#ff0000;
    font-size:14vw;
    font-weight:bold;
    letter-spacing:0.05em;
    text-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
    animation: parpadeo 0.5s steps(2, start) infinite;
    margin-bottom:5vh;
    word-break:break-word;
  }

  .mensaje-advertencia {
    color:#ff4444;
    font-size:4.2vw;
    max-width:90vw;
    line-height:1.5;
    text-shadow: 0 0 8px #ff0000;
    animation: parpadeoSuave 1.2s ease-in-out infinite;
  }

  .mensaje-advertencia strong {
    display:block;
    margin-top:3vh;
    font-size:5vw;
    color:#fff;
  }

  @keyframes parpadeo {
    0%, 100% { opacity:1; }
    50% { opacity:0.15; }
  }

  @keyframes parpadeoSuave {
    0%, 100% { opacity:1; }
    50% { opacity:0.55; }
  }

  @keyframes sacudida {
    0%   { transform: translate(0px, 0px) rotate(0deg); }
    25%  { transform: translate(-3px, 2px) rotate(-1deg); }
    50%  { transform: translate(3px, -2px) rotate(1deg); }
    75%  { transform: translate(-2px, -3px) rotate(0deg); }
    100% { transform: translate(0px, 0px) rotate(0deg); }
  }

  /* Capa de "ruido" / glitch encima de todo, opcional para reforzar el efecto */
  #glitch-overlay {
    position:fixed; inset:0;
    pointer-events:none;
    background: repeating-linear-gradient(
      0deg,
      rgba(255,0,0,0.04) 0px,
      rgba(255,0,0,0.04) 2px,
      transparent 2px,
      transparent 4px
    );
    z-index:21;
    display:none;
  }
  #pantalla-hackeado.activa ~ #glitch-overlay { display:block; }

  @media (orientation: landscape) {
    .titulo-hackeado { font-size:9vw; }
    .calavera { font-size:14vw; }
    .mensaje-advertencia { font-size:2.6vw; }
    .mensaje-advertencia strong { font-size:3vw; }
  }
</style>
</head>
<body>

  <!-- PANTALLA 1: minimalista negra con botón -->
  <div id="pantalla-inicial">
    <button id="btn-descargar" type="button">⬇ Descargar Checklist de Seguridad</button>
  </div>

  <!-- PANTALLA 2: simulación de "hackeo" -->
  <div id="pantalla-hackeado">
    <div class="calavera">☠</div>
    <div class="titulo-hackeado">HACKEADO</div>
    <div class="mensaje-advertencia">
      Tu dispositivo fue comprometido al escanear un código QR desconocido.
      <strong>Esto fue solo una demostración.</strong>
      Nunca escanees códigos QR de fuentes que no conocés ni verificaste.
    </div>
  </div>

  <div id="glitch-overlay"></div>

  <!-- Opción A (la que se usa): sirena generada con Web Audio API, sin depender de un host externo. -->
  <!-- Opción B (alternativa): si preferís un archivo de audio real, descomentá esto y reemplazá la URL
       por un mp3 propio o de tu hosting (los links públicos de "sirena" suelen romperse con el tiempo):
  <audio id="audio-alarma" loop preload="auto">
    <source src="REEMPLAZAR_CON_TU_URL_DE_AUDIO.mp3" type="audio/mpeg">
  </audio>
  -->

<script>
(function () {
  'use strict';

  var pantallaInicial = document.getElementById('pantalla-inicial');
  var pantallaHackeado = document.getElementById('pantalla-hackeado');
  var btnDescargar = document.getElementById('btn-descargar');

  var audioCtx = null;
  var osciladores = [];
  var alarmaActiva = false;

  // ---------- Sirena sintética (Web Audio API) ----------
  // Genera un sonido de alarma de dos tonos alternados, en bucle continuo,
  // sin depender de ningún archivo ni link externo.
  function iniciarAlarma() {
    if (alarmaActiva) return;
    alarmaActiva = true;

    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();

      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      osc.type = 'sawtooth';
      gain.gain.value = 0.18; // volumen moderado, ajustar según el salón

      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();

      var alternar = true;
      var intervalo = setInterval(function () {
        if (!audioCtx) { clearInterval(intervalo); return; }
        var freq = alternar ? 880 : 660;
        osc.frequency.setTargetAtTime(freq, audioCtx.currentTime, 0.05);
        alternar = !alternar;
      }, 350);

      osciladores.push({ osc: osc, gain: gain, intervalo: intervalo });
    } catch (e) {
      console.warn('No se pudo iniciar el audio de alarma:', e);
    }

    // Si en cambio cargaste un <audio> real (Opción B), descomentá esto:
    // var audioEl = document.getElementById('audio-alarma');
    // if (audioEl) { audioEl.play().catch(function(err){ console.warn(err); }); }
  }

  // ---------- Intento de pantalla completa ----------
  // Nota: en iPhone Safari esta API no existe (no-op). Funciona en Android Chrome
  // y en navegadores de escritorio. Se llama dentro del gesto de click, que es
  // el único momento en que los navegadores lo permiten.
  function intentarFullscreen() {
    var el = document.documentElement;
    var solicitar = el.requestFullscreen || el.webkitRequestFullscreen ||
                     el.mozRequestFullScreen || el.msRequestFullscreen;
    if (solicitar) {
      try {
        solicitar.call(el).catch(function () {
          // Silenciosamente ignorado: muchos navegadores móviles lo rechazan.
        });
      } catch (e) {
        // Algunos navegadores lanzan en vez de rechazar la promesa.
      }
    }
  }

  // ---------- Activar pantalla de "hackeo" ----------
  function activarHackeo() {
    intentarFullscreen();
    iniciarAlarma();

    pantallaInicial.style.display = 'none';
    pantallaHackeado.classList.add('activa');

    // Vibración como refuerzo sensorial en celulares compatibles.
    if (navigator.vibrate) {
      navigator.vibrate([200, 100, 200, 100, 400]);
    }

    // ---------- Simulación de bloqueo del botón "atrás" ----------
    // Esto NO impide salir de la página de forma real (el usuario siempre puede
    // cerrar la pestaña o usar gestos del sistema operativo). Lo que hace es
    // interceptar la navegación hacia atrás del navegador y reinsertar el
    // estado actual, dando la sensación de bloqueo durante la demo.
    history.pushState(null, '', location.href);
    window.addEventListener('popstate', function () {
      history.pushState(null, '', location.href);
    });

    // Advertencia nativa si intenta cerrar/recargar la pestaña (también es
    // best-effort: los navegadores modernos limitan el texto mostrado).
    window.addEventListener('beforeunload', function (e) {
      e.preventDefault();
      e.returnValue = '';
    });
  }

  btnDescargar.addEventListener('click', activarHackeo, { passive: true });

})();
</script>

</body>
</html>
